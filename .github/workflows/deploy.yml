name: Deploy Quartz site
on:
  push:
    branches:
      - main # 当主分支（笔记）更新时触发 Pipeline

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Quartz Framework (publish branch)
        uses: actions/checkout@v4
        with:
          ref: publish # 步骤1：检出 Quartz 框架代码

      - name: Checkout Notes Content (main branch)
        uses: actions/checkout@v4
        with:
          ref: main
          path: content # 步骤2：将 main 分支的所有笔记直接拉取到 Quartz 的 content 目录下

      - name: Copy README to index
        run: cp content/README.md content/index.md

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Quartz 4 需要 Node 22 环境

      - name: Install Dependencies
        run: npm ci

      - name: Build Quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public # 上传 Quartz 默认的构建输出目录

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4